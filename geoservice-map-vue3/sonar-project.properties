# Configuration SonarQube pour geoservice-map-vue3
sonar.projectKey=geoservice-map-vue3
sonar.projectName=GeoService Map Vue3
sonar.projectVersion=1.1.7

# Configuration serveur SonarQube
sonar.host.url=http://192.168.1.20:9000

# Token d'authentification - À configurer via variable d'environnement
# Méthode recommandée : utiliser SONAR_TOKEN en variable d'environnement
# Exemple : export SONAR_TOKEN=your_token_here
# Alternative : décommenter la ligne suivante et remplacer par votre token
# sonar.token=your_token_here

# Répertoires source
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.js,**/*.test.js,**/*.spec.ts,**/*.test.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.min.js,**/vendor/**
sonar.test.exclusions=**/node_modules/**,**/dist/**

# Paramètres généraux
sonar.sourceEncoding=UTF-8

# Configuration des langages
# Les fichiers .vue sont traités comme des fichiers JavaScript
sonar.javascript.file.suffixes=.js,.jsx,.vue
sonar.typescript.file.suffixes=.ts,.tsx

# Configuration spécifique pour Vue.js
# Permet l'analyse du code TypeScript dans les fichiers .vue
sonar.javascript.environments=vue

# Coverage (optionnel - à configurer selon vos besoins)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info