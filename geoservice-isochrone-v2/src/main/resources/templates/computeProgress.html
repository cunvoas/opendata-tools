<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{fragments/fragment-head :: head(#{compute.progress.title})}"></head>

<body class="sb-nav-fixed">
    <div th:insert="~{fragments/fragment-navUp :: navUp}"></div>
    <div id="layoutSidenav">
        <div th:insert="~{fragments/fragment-navLeft :: navLeft}"></div>

        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid px-4">
                    <h1 class="mt-4" th:text="#{compute.progress.title}">Progression des Calculs</h1>
                    
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a th:href="@{/mvc/dashboard}" th:text="#{menu.dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item active" th:text="#{compute.progress.title}">Progression</li>
                    </ol>

                    <div class="card mb-4">
                        <div class="card-header">
                            <i class="fas fa-table me-1"></i>
                            <span th:text="#{compute.progress.table.header}">Détail par Ville et Année</span>
                        </div>
                        <div class="card-body">
                            <table class="table table-bordered table-striped" id="progressTable">
                                <thead>
                                    <tr>
                                        <th th:text="#{compute.progress.epci}">EPCI</th>
                                        <th th:text="#{compute.progress.city}">Ville</th>
                                        <th th:text="#{compute.progress.year}">Année</th>
                                        <th th:text="#{compute.progress.to_process}">À traiter</th>
                                        <th th:text="#{compute.progress.in_process}">En cours</th>
                                        <th th:text="#{compute.progress.processed}">Traité</th>
                                        <th th:text="#{compute.progress.in_error}">Erreur</th>
                                        <th th:text="#{compute.progress.total}">Total</th>
                                        <th th:text="#{compute.progress.percent}">%</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="stat : ${stats}">
                                        <td th:text="${stat.epciName}">EPCI</td>
                                        <td th:text="${stat.cityName}">Ville</td>
                                        <td th:text="${stat.annee}">Year</td>
                                        <td th:text="${#numbers.formatInteger(stat.toProcess, 1, 'POINT')}">0</td>
                                        <td th:text="${#numbers.formatInteger(stat.inProcess, 1, 'POINT')}">0</td>
                                        <td th:text="${#numbers.formatInteger(stat.processed, 1, 'POINT')}">0</td>
                                        <td th:text="${#numbers.formatInteger(stat.inError, 1, 'POINT')}">0</td>
                                        <td th:text="${#numbers.formatInteger(stat.toProcess + stat.inProcess + stat.processed + stat.inError, 1, 'POINT')}">0</td>
                                        <td>
                                            <div class="progress">
                                                <div class="progress-bar" role="progressbar" 
                                                     th:with="total=${stat.toProcess + stat.inProcess + stat.processed + stat.inError}"
                                                     th:style="'width: ' + (${total} > 0 ? (${stat.processed} * 100 / ${total}) : 0) + '%'" 
                                                     th:aria-valuenow="${total} > 0 ? (${stat.processed} * 100 / ${total}) : 0" 
                                                     aria-valuemin="0" aria-valuemax="100"
                                                     th:text="${total} > 0 ? (${#numbers.formatDecimal(stat.processed * 100.0 / total, 1, 1)} + '%') : '0%'">
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
            <footer th:replace="~{fragments/fragment-footer :: footer}"></footer>
        </div>
    </div>
    <div th:insert="~{fragments/fragment-jslibs :: appPage}"></div>
</body>
</html>
